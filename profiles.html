    /* ── Profile Cards Grid ─────────────────────────────── */
    .profiles-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1.4rem;
      padding: 0.5rem 0 2.5rem;
    }

    @media (max-width: 900px) {
      .profiles-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 540px) {
      .profiles-grid { grid-template-columns: 1fr; }
    }

    /* ── Individual Card ────────────────────────────────── */
    .pcard {
      background: linear-gradient(180deg, rgba(42,10,10,0.94), rgba(22,5,5,0.97));
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.22);
      padding: 1.4rem 1.25rem 1.15rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .pcard::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 18px;
      pointer-events: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .pcard:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 48px rgba(0,0,0,0.38);
    }

    /* hidden when filtered out */
    .pcard[hidden] { display: none; }

    /* ── Avatar ─────────────────────────────────────────── */
    .pcard-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      border: 2.5px solid rgba(232,108,58,0.5);
      box-shadow: 0 0 0 4px rgba(232,108,58,0.1);
      background: rgba(255,255,255,0.04);
    }

      display: flex;

      margin: 0;

  <script>
    // ── Category Filter Logic ─────────────────────────────
    (function () {
      const pills  = document.querySelectorAll('#filterBar .filter-pill');
      const cards  = document.querySelectorAll('#profilesGrid .pcard');

      pills.forEach(pill => {
        pill.addEventListener('click', () => {
          // update active pill
          pills.forEach(p => p.classList.remove('active'));
          pill.classList.add('active');

          const filter = pill.dataset.filter;

          cards.forEach(card => {
            const match = filter === 'all' || card.dataset.category === filter;
            if (match) {
              card.removeAttribute('hidden');
            } else {
              card.setAttribute('hidden', '');
            }
          });
        });
      });
    })();
  </script>
  <button id="backToTop" aria-label="Back to top">↑</button>
  <script>
    (function() {
      // 1. JS For Premium Polishes
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add("animated");
          }
        });
      }, { threshold: 0.1 });
      document.querySelectorAll('.card, .profile-card, .mentor-card, .market-card, .stat-card, .showcase-card, .pillar-card, .impact-card, .banner-card, .pcard, .mcard, .lcard').forEach(card => {
        card.classList.add("scroll-reveal");
        observer.observe(card);
      });

      const header = document.querySelector('.site-header');
      window.addEventListener('scroll', () => {
        const b = document.getElementById("backToTop"); if(b) b.classList.toggle("scrolled", window.scrollY > 400); if(header) header.classList.toggle('scrolled', window.scrollY > 60);
      });

      document.querySelectorAll('button, .button, a[class*="btn"], .pcard-book, .mcard-book, .lcard-btn, .sell-banner-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          const ripple = document.createElement('span');
          ripple.classList.add('ripple');
          const rect = this.getBoundingClientRect();
          const size = Math.max(rect.width, rect.height);
          ripple.style.width = ripple.style.height = size + 'px';
          ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
          ripple.style.top  = (e.clientY - rect.top  - size/2) + 'px';
          this.appendChild(ripple);
          setTimeout(() => ripple.remove(), 600);
        });
      });

      // 2. Empty State Injections for Filters
      const grids = document.querySelectorAll('.profiles-grid, .mentors-grid, .listings-grid');
      grids.forEach(grid => {
        const emptyState = document.createElement('div');
        emptyState.id = 'emptyState';
        emptyState.style.cssText = 'display:none; text-align:center; padding: 64px 24px; color: #999; grid-column: 1 / -1; width: 100%;';
        emptyState.innerHTML = `
          <div style="font-size:48px; margin-bottom:12px;">🔍</div>
          <p style="font-size:18px; font-weight:600; color:#dfdfdf;">No results found</p>
          <p style="margin-top:8px;">Try a different filter or check back later.</p>
        `;
        grid.appendChild(emptyState);
        
        document.body.addEventListener('click', () => {
          setTimeout(() => {
            const cards = grid.querySelectorAll('.pcard, .mcard, .lcard');
            let visible = 0;
            cards.forEach(c => {
               if(c.style.display !== 'none') visible++;
            });
            if(cards.length > 0) {
               emptyState.style.display = visible === 0 ? 'block' : 'none';
            }
          }, 50);
        });
      });

      const currentPage = window.location.pathname.split("/").pop() || 'index.html';
      document.querySelectorAll(".nav-links a").forEach(link => {
        const href = link.getAttribute("href");
        if (href === currentPage || (currentPage === '' && href === 'index.html')) {
          link.classList.add("active");
        }
      });
      const mobileToggle = document.getElementById('mobileNavToggle');
      const mobileMenu = document.getElementById('mobileNavMenu');
      if(mobileToggle && mobileMenu) {
        mobileToggle.addEventListener('click', () => {
          mobileMenu.classList.toggle('open');
        });
        mobileMenu.querySelectorAll('a').forEach(link => {
          link.addEventListener('click', () => {
            mobileMenu.classList.remove('open');
          });
        });
      }
      const btn = document.getElementById('backToTop');
      if(btn) {
        window.addEventListener('scroll', () => {
          btn.style.opacity = window.scrollY > 300 ? '1' : '0';
          btn.style.pointerEvents = window.scrollY > 300 ? 'auto' : 'none';
        });
        btn.addEventListener('click', () => {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      }
    })();
  </script>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const glow = document.getElementById('cursorGlow');
  if (glow && window.innerWidth > 768) {
    document.addEventListener('mousemove', (e) => {
      glow.style.left = e.clientX + 'px';
      glow.style.top  = e.clientY + 'px';
      glow.style.opacity = '1';
    });
    document.addEventListener('mouseleave', () => {
      glow.style.opacity = '0';
    });
    /* Burst on hover over buttons/cards */
    document.querySelectorAll('button, article, .pcard, .mcard, .lcard, .card, .profile-card, nav a').forEach(el => {
      el.addEventListener('mouseenter', () => {
        glow.style.width  = '420px';
        glow.style.height = '420px';
        glow.style.background = `radial-gradient(circle, color-mix(in srgb, var(--color-primary) 13%, transparent) 0%, transparent 70%)`;
      });
      el.addEventListener('mouseleave', () => {
        glow.style.width  = '300px';
        glow.style.height = '300px';
        glow.style.background = `radial-gradient(circle, color-mix(in srgb, var(--color-primary) 8%, transparent) 0%, transparent 70%)`;
      });
    });
  }
});
</script>

<script>
  // Apply saved or default theme immediately
  const savedTheme = localStorage.getItem('kk-theme') || 'dark-cold';
  document.documentElement.setAttribute('data-theme', savedTheme);

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('kk-theme', theme);

    // Update active states on buttons
    document.querySelectorAll('.theme-option').forEach(btn => {
      const isActive = btn.dataset.theme === theme;
      btn.classList.toggle('active', isActive);
      // Ensure the check icon is toggled appropriately
      const checkIcon = btn.querySelector('.theme-check');
      if(checkIcon) checkIcon.style.opacity = isActive ? '1' : '0';
    });
  }

  // Set initial active state
  document.addEventListener('DOMContentLoaded', () => {
    applyTheme(savedTheme);

    // Toggle palette open/close
    const toggleBtn = document.getElementById('themeToggleBtn');
    const palette   = document.getElementById('themePalette');

    toggleBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      palette.classList.toggle('hidden');
    });

    // Close palette when clicking outside
    document.addEventListener('click', () => {
      palette.classList.add('hidden');
    });
    palette.addEventListener('click', e => e.stopPropagation());

    // Theme option click
    document.querySelectorAll('.theme-option').forEach(btn => {
      btn.addEventListener('click', () => {
        applyTheme(btn.dataset.theme);
      });
    });
  });
</script>

</div>

<script>
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('kk-theme', t);
  document.querySelectorAll('.theme-opt').forEach(b => b.classList.toggle('active', b.dataset.theme === t));
}
(function(){ setTheme(localStorage.getItem('kk-theme') || 'dark-cold'); })();

const dot = document.getElementById('cursor-dot');
const ring = document.getElementById('cursor-ring');
let rx=0,ry=0,dx=0,dy=0;
document.addEventListener('mousemove', e => { dx=e.clientX; dy=e.clientY; dot.style.left=dx+'px'; dot.style.top=dy+'px'; });
(function loop(){ rx+=(dx-rx)*0.12; ry+=(dy-ry)*0.12; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(loop); })();
document.querySelectorAll('a,button,.profile-card,.card').forEach(el=>{
  el.addEventListener('mouseenter',()=>{ ring.style.width='52px'; ring.style.height='52px'; ring.style.opacity='1'; });
  el.addEventListener('mouseleave',()=>{ ring.style.width='36px'; ring.style.height='36px'; ring.style.opacity='0.65'; });
});
</script>
</body>
</html>
